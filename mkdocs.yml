site_name: Upsales Python SDK
site_description: Async Python wrapper for the Upsales CRM API
site_url: https://github.com/AxelOhlander/upsales-python-sdk

repo_name: AxelOhlander/upsales-python-sdk
repo_url: https://github.com/AxelOhlander/upsales-python-sdk

theme:
  name: material
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            separate_signature: true
            docstring_section_style: table

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - admonition
  - toc:
      permalink: true
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Authentication: authentication.md
  - Terminology: terminology.md
  - Guides:
      - API File Reference: guides/api-file-reference.md
      - Adding Endpoints (AI): guides/adding-endpoints-ai.md
      - Model Validation: guides/model-validation.md
      - Claude Code Hooks: guides/claude-code-hooks.md
  - Patterns:
      - Creating Models: patterns/creating-models.md
      - Adding Resources: patterns/adding-resources.md
      - Custom Fields: patterns/custom-fields.md
      - Nested Required Fields: patterns/nested-required-fields.md
      - VCR Testing: patterns/vcr-testing.md
      - Automation Tools: patterns/automation-tools-reference.md
  - Examples:
      - Advanced Patterns: examples/advanced-patterns.md
  - API Reference:
      - Client: api-reference/client.md
      - Settings: api-reference/settings.md
      - HTTP: api-reference/http.md
      - Models: api-reference/models.md
      - Resources: api-reference/resources.md
      - Exceptions: api-reference/exceptions.md
  - Research:
      - Advanced Query Syntax: research/advanced-query-syntax.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/AxelOhlander/upsales-python-sdk
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/upsales/
